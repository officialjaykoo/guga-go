# GUGA Go - KataGo GTP config (CPU/Eigen)
# 목표: 매우 낮은 부하 + 안정적인 응답 (저사양/타임아웃 완화 기준)

# Logs
logDir = gtp_logs
logAllGTPCommunication = false
logSearchInfo = false
logSearchInfoForChosenMove = false
logToStderr = false

# Rules (GTP/GUI가 바꾸지 않는 한 이 값이 기본)
rules = japanese

# Resignation - 너무 이른 기권 방지
allowResignation = true
resignThreshold = -0.95
resignConsecTurns = 12
resignMinScoreDifference = 20
resignMinMovesPerBoardArea = 0.35

# Search limits (저사양/저지연 목표)
maxVisits = 400
maxTime = 2.0
numSearchThreads = 2
lagBuffer = 1.0

# 작은 캐시로 메모리 절약
nnCacheSizePowerOfTwo = 16
nnMutexPoolSizePowerOfTwo = 13

# 안전한 기본값
ignorePreRootHistory = false
analysisIgnorePreRootHistory = false
rootNumSymmetriesToSample = 1
useLcbForSelection = true

# Utility weights (기본값과 유사, 과도한 스코어 추종 억제)
winLossUtilityFactor = 1.0
staticScoreUtilityFactor = 0.55
dynamicScoreUtilityFactor = 0.00

# 불확실성/노이즈는 끔 (저사양 안정성)
useUncertainty = false
useNoisePruning = false




